apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sreplicalimit
spec:
  crd:
    spec:
      names:
        kind: K8sReplicaLimit
      validation:
        openAPIV3Schema:
          type: object
          properties:
            maxReplicas:
              type: integer
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sreplicalimit

        violation[{"msg": msg}] {
          input.review.kind.kind == "Deployment"

          replicas := input.review.object.spec.replicas
          max := input.parameters.maxReplicas

          replicas > max

          msg := sprintf(
            "Deployment replicas %v exceeds maximum allowed %v",
            [replicas, max]
          )
        }