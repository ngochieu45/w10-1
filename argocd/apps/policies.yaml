apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: image-policies
  namespace: argocd
  annotations:
    # sync-wave trên app con KHÔNG có tác dụng giữa 2 app độc lập.
    # Thay vào đó: dùng automated.prune=false + retry để
    # image-policies tự retry cho đến khi CRD của policy-controller ready.
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/ngochieu45/w10-1.git
    targetRevision: main
    path: policies
  destination:
    server: https://kubernetes.default.svc
    namespace: cosign-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true   # ← key fix: bỏ qua dry-run khi CRD chưa có
      - ServerSideApply=true
    retry:
      limit: 10
      backoff:
        duration: 20s
        factor: 2
        maxDuration: 5m